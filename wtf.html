<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Diagnostic - Security Alert</title>
    <style>
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #terminal {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 25px;
            width: 90%;
            max-width: 450px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            text-align: left;
        }

        .header {
            border-bottom: 1px solid #30363d;
            padding-bottom: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
        }

        .dot { height: 12px; width: 12px; border-radius: 50%; display: inline-block; }
        .red { background: #ff5f56; }
        .yellow { background: #ffbd2e; }
        .green { background: #27c93f; }

        #main-content { display: none; }

        .error-msg {
            color: #ff7b72;
            font-weight: bold;
            font-family: 'Courier New', monospace;
        }

        .btn-action {
            background: #238636;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 25px;
            position: absolute; /* Needed for the runaway effect */
            transition: 0.1s;
        }

        #log-container {
            font-family: 'Courier New', monospace;
            font-size: 14px;
            color: #7d8590;
        }
    </style>
</head>
<body>

    <div id="terminal">
        <div class="header">
            <div>
                <span class="dot red"></span>
                <span class="dot yellow"></span>
                <span class="dot green"></span>
            </div>
            <span style="font-size: 12px; opacity: 0.5;">System Diagnostics</span>
        </div>

        <div id="loader">
            <p id="loading-text">Scanning for vulnerabilities...</p>
            <div id="log-container"></div>
        </div>

        <div id="main-content">
            <p class="error-msg">[!] SECURITY BREACH DETECTED</p>
            <p>Multiple unauthorized hooks found in kernel. System integrity at risk.</p>
            <button class="btn-action" id="runBtn">RESTORE SYSTEM</button>
        </div>
    </div>

    <script>
        const loader = document.getElementById('loader');
        const loadText = document.getElementById('loading-text');
        const log = document.getElementById('log-container');
        const content = document.getElementById('main-content');
        const btn = document.getElementById('runBtn');

        // 1. Professional Loading Steps
        const steps = [
            "> Initializing firewall scan...",
            "> Checking memory integrity...",
            "> ERROR: Buffer overflow detected!",
            "> Identifying source...",
            "> Access Denied by remote host."
        ];

        let i = 0;
        let interval = setInterval(() => {
            if(i < steps.length) {
                const p = document.createElement('div');
                p.innerHTML = steps[i];
                log.appendChild(p);
                i++;
            } else {
                clearInterval(interval);
                setTimeout(() => {
                    loader.style.display = 'none';
                    content.style.display = 'block';
                }, 1000);
            }
        }, 800);

        // 2. The Runaway Button (Bhagne Button)
        btn.addEventListener('mouseover', () => {
            const x = Math.random() * (window.innerWidth - btn.clientWidth);
            const y = Math.random() * (window.innerHeight - btn.clientHeight);
            btn.style.left = x + 'px';
            btn.style.top = y + 'px';
        });

        // 3. The Grand Reveal
        btn.addEventListener('click', () => {
            // Screen glitch effect
            document.body.style.backgroundColor = "red";
            setTimeout(() => {
                document.body.style.backgroundColor = "#0d1117";
                alert("CRITICAL SYSTEM FAILURE!");
                alert("Why are you trying to fix it?");
                alert("Your files are being uploaded to ZyroX Servers...");
                alert("Just kidding! 😹");
                alert("The Real Mod Menu is...");
                alert("STILL COMING SOON! Stay tuned.");
                location.reload(); 
            }, 100);
        });
    </script>
</body>
</html>
