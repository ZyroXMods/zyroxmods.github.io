            overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5);

                /* App Cards */
        .app-list { display: flex; flex-direction: column; gap: 32px; padding-bottom: 30px; }
        .app-card { text-decoration: none; color: inherit; display: flex; flex-direction: column; gap: 12px; transition: 0.2s; }

footer {

}

<body>
    <div class="container">
        <div class="content-wrap">
            <div class="header-nav">
                <h1 onclick="window.location.reload()">ZyroX Mods</h1>
                <div class="menu-btn" onclick="toggleMenu()"><i class="fas fa-bars" id="menuIcon"></i></div>

            <nav class="nav-overlay" id="navMenu">

             <div class="search-area">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="Search" onkeyup="handleSearch()" autocomplete="off">
                </div>

             </div>

            <div class="app-list" id="appList"></div>

  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyDtMTEiAyhletlmv8oPmHA2taR38LVqF9Y",
            authDomain: "zyrox-mods.firebaseapp.com",
            databaseURL: "https://zyrox-mods-default-rtdb.firebaseio.com",
            projectId: "zyrox-mods",
            storageBucket: "zyrox-mods.firebasestorage.app",
            messagingSenderId: "1036623690767",
            appId: "1:1036623690767:web:9ab5f015a3cb0b078d777a"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        
        const mods = [
            { id: "frag", name: "Frag Pro Shooter", version: "4.21.0", type: "Action", c_icon: "fa-gun", v_icon: "fa-code-branch", img: "fragh.jpg" },
            { id: "dude", name: "Dude Theft Wars", version: "0.9.0.9f6", type: "Action", c_icon: "fa-gun", v_icon: "fa-code-branch", img: "dudeh.png" },
            { id: "pvz", name: "PVZ Fusion", version: "3.6.1", type: "Arcade", c_icon: "fa-gamepad", v_icon: "fa-code-branch", img: "pvzh.png" }
            { id: "stick", name: "Stick War Legacy", version: "2026.1.467", type: "Arcade", c_icon: "fa-gamepad", v_icon: "fa-code-branch", img: "stickh.png" },
            { id: "subway", name: "Subway Surfers", version: "3.2.1", type: "Arcade", c_icon: "fa-gamepad", v_icon: "fa-code-branch", img: "subwayh.png" }
        ];

        function loadMods(data = mods) {
            const list = document.getElementById('appList');
            list.innerHTML = data.map(mod => `
                <a href="games.html?id=${mod.id}" class="app-card">
                    <div class="thumb">
                        <img src="${mod.img}" onerror="this.src='https://via.placeholder.com/400x225/111/ff4d4d?text=${mod.name}'">
                    </div>
                    <div class="info">
                        <h3 class="app-name">${mod.name}</h3>
                        <div class="meta-data">
                            <div class="meta-item"><i class="fas ${mod.v_icon}"></i> v${mod.version}</div>•
                            <div class="meta-item"><i class="fas ${mod.c_icon}"></i> ${mod.type}</div>•
                            <div class="meta-item"><i class="fas fa-download"></i> <span id="count-${mod.id}">0</span></div>
                        </div>
                    </div>
                </a>
            `).join('');

            // Listen to Firebase for live count updates
            data.forEach(mod => {
                database.ref('downloads/' + mod.id).on('value', (s) => {
                    const count = s.val() || 0;
                    const el = document.getElementById('count-' + mod.id);
                    if(el) el.innerText = count.toLocaleString();
                });
            });
        }

        function handleSearch() {
    let val = document.getElementById('searchInput').value.toLowerCase();
    const box = document.getElementById('suggestionBox');

    if (!val) {
        box.style.display = 'none';
        loadMods(mods);
        return;
    }

    // 1. Search sanga match hune mods filter garne
    let filtered = mods.filter(m => m.name.toLowerCase().includes(val));

    // 2. Count ko aadhar ma Sort garne (Highest count mathi aauchha)
    filtered.sort((a, b) => {
        const countA = parseInt(document.getElementById('count-' + a.id)?.innerText.replace(/,/g, '') || 0);
        const countB = parseInt(document.getElementById('count-' + b.id)?.innerText.replace(/,/g, '') || 0);
        return countB - countA; 
    });

    // 3. Suggestions display garne
    if (filtered.length > 0) {
        box.innerHTML = filtered.map(m => {
            const liveCount = document.getElementById('count-' + m.id)?.innerText || '0';
            return `
                <div class="suggestion-item" onclick="selectSuggestion('${m.name}')" 
                     style="display: flex; justify-content: space-between; align-items: center; padding: 12px 15px; cursor: pointer;">
                    <span>
                        <i class="fas fa-search" style="font-size:0.75rem; color:#8e99ab; margin-right: 8px;"></i> ${m.name}
                    </span>
                    <span style="font-size: 0.7rem; color: #ff4d4d; font-weight: 700;">
                        <i class="fas fa-fire"></i> ${liveCount}
                    </span>
                </div>
            `;
        }).join('');
        box.style.display = 'flex';
    } else {
        box.style.display = 'none';
    }
    loadMods(filtered);
}

function selectSuggestion(name) {
    document.getElementById('searchInput').value = name;
    document.getElementById('suggestionBox').style.display = 'none';
    handleSearch();
}

loadMods();

        function toggleMenu() {
            const menu = document.getElementById('navMenu');
            const bg = document.getElementById('overlayBg');
            const icon = document.getElementById('menuIcon');
            const isActive = menu.classList.toggle('active');
            
            // Script vitra ko display logic fix
            bg.style.display = isActive ? 'block' : 'none';
            
            if (isActive) {
                icon.classList.replace('fa-bars', 'fa-times');
            } else {
                icon.classList.replace('fa-times', 'fa-bars');
            }
        }

        function setActive(element) {
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active-link'));
            element.classList.add('active-link');
            setTimeout(toggleMenu, 300);
        }

          // Close suggestions on outside click
        window.onclick = (e) => {
            if (!e.target.closest('.search-area')) {
                document.getElementById('suggestionBox').style.display = 'none';
            }
        };
    </script>
</body>
